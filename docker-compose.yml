services:
  mongodb:
    image: mongo:7.0
    container_name: wellai_mongodb
    restart: unless-stopped
    ports:
      - '${MONGO_PORT:-27017}:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - wellai_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: wellai_agent
    environment:
      PORT: 50052
      BOT_SERVICE_ADDR: bot:50051
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    networks:
      - wellai_network
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=127.0.0.1:50052"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: wellai_bot
    environment:
      GRPC_PORT: 50051
      AGENT_SERVICE_ADDR: agent:50052
      WHATSAPP_PORT: 5000
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB_NAME: wellai_bot
      TERMS_CONDITIONS_PATH: terms-conditions.txt
      LOG_LEVEL: info
      LOG_PRETTY: "true"
      NODE_ENV: production
    ports:
      - '${WHATSAPP_HTTP_PORT:-5000}:5000'
    networks:
      - wellai_network
    depends_on:
      mongodb:
        condition: service_healthy
      agent:
        condition: service_started
    restart: unless-stopped

volumes:
  mongo_data:

networks:
  wellai_network:
    driver: bridge
