services:
    agent:
        build:
            context: ./agent
            dockerfile: Dockerfile
        environment:
            PORT: 50052
            BOT_SERVICE_ADDR: bot:50051
        restart: unless-stopped

    bot:
        build:
            context: ./bot
            dockerfile: Dockerfile
        environment:
            GRPC_PORT: 50051
            AGENT_SERVICE_ADDR: agent:50052
            WHATSAPP_PORT: 5000
            WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
            WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
            WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
        ports:
            - '${WHATSAPP_HTTP_PORT:-5000}:5000'
        depends_on:
            - agent
        restart: unless-stopped
